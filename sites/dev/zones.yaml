# Zones for the development site, one block per camera.
#
# Polygon vertices are NORMALIZED to [0.0, 1.0], as [x, y] fractions of frame
# width and height. Normalized coordinates survive a change in stream resolution
# (a client NVR reconfigured from 720p to 1080p would otherwise silently shift
# every zone). See docs/DECISIONS.md D-010.
#
# Draw these against a real frame with: uv run python scripts/draw_zones.py
# The values below are a placeholder centered rectangle; redraw them once a clip
# or the live camera is available.
camera-1:
  - name: zona-demo
    polygon:
      - [0.30, 0.40]
      - [0.70, 0.40]
      - [0.70, 0.90]
      - [0.30, 0.90]
